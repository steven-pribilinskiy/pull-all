name: Release

# Build the polygit binary for each supported target on a version tag and attach them to the
# GitHub Release, so the install script (and `releases/latest/download/...`) can fetch them.
# polygit is UNIX-only (it uses std::os::unix), so there is no Windows target — use WSL there.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-13,         target: x86_64-apple-darwin }
          - { os: macos-14,         target: aarch64-apple-darwin }
    steps:
      - uses: actions/checkout@v6

      - name: Add Rust target
        run: rustup update stable && rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          bin="target/${{ matrix.target }}/release/polygit"
          cp "$bin" "polygit-${{ matrix.target }}"
          tar -czf "polygit-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" polygit

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            polygit-${{ matrix.target }}
            polygit-${{ matrix.target }}.tar.gz
